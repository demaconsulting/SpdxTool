---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - Misspelled words should be fixed in the source
# - NEVER add a misspelled word to the 'words' list
# - PROPOSE only genuine technical terms/names as needed

version: "0.2"
language: en

# Project-specific technical terms and tool names
words:
  - Anson
  - Blockquotes
  - buildmark
  - BuildMark
  - build_notes
  - buildMultiTargeting
  - buildnotes
  - camelcase
  - Checkmarx
  - code_quality
  - code_review_plan
  - code_review_report
  - CodeQL
  - copilot
  - cspell
  - csproj
  - dbproj
  - dcterms
  - declaredat
  - Dema
  - demaconsulting
  - DEMACONSULTINGNUGETKEY
  - Dependabot
  - dependabot
  - doctitle
  - dotnet
  - dotnettool
  - editorconfig
  - filepart
  - fsproj
  - Gidget
  - gitattributes
  - gitignore
  - hotspots
  - ibiqlik
  - LINQ
  - maintainer
  - markdownlint
  - mermaid
  - MSBUILD
  - MSBUILDDISABLENODEREUSE
  - MSTest
  - mstest
  - myterm
  - ncipollo
  - NOASSERTION
  - ntia
  - nuget
  - nupkg
  - opencover
  - pagetitle
  - pandoc
  - Pandoc
  - Propagatable
  - purl
  - Pylint
  - Qube
  - reqstream
  - ReqStream
  - requirements_doc
  - requirements_report
  - reviewmark
  - ReviewMark
  - rezip
  - sandboxed
  - Sarif
  - SarifMark
  - SBOM
  - Semgrep
  - semver
  - slnx
  - snupkg
  - Sonar
  - SonarAnalyzer
  - SonarCloud
  - sonarmark
  - SonarMark
  - sonarscanner
  - SonarQube
  - spdx
  - SPDX
  - SPDXID
  - SpdxModel
  - SpdxTool
  - streetsidesoftware
  - templatetool
  - testname
  - TMPL
  - trace_matrix
  - tracematrix
  - triaging
  - Trivy
  - trx
  - vbproj
  - vcxproj
