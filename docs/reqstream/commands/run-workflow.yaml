# DemaConsulting.SpdxTool run-workflow Command Requirements
#
# This file contains requirements for the run-workflow command, covering
# workflow execution and NuGet-based workflow support.
# It is included by the root requirements.yaml file.
---
sections:
  - title: run-workflow Command
    requirements:
      - id: SpdxTool-Wkf-RunWorkflow
        title: The tool shall execute workflow files using the run-workflow command.
        tags:
          - workflow
        justification: |
          Complex SPDX document operations often require multiple steps. Workflows
          enable users to define and automate multi-step processes in a declarative
          YAML format.
        tests:
          - SpdxTool_AddPackage
          - SpdxTool_AddRelationship
          - SpdxTool_CopyPackage
          - SpdxTool_UpdatePackage

      - id: SpdxTool-Wkf-NuGetWorkflow
        title: The tool shall support running workflow files from NuGet packages using the run-workflow command.
        tags:
          - workflow
        justification: |
          Users need to reference workflow files stored in NuGet packages so that
          workflows can be versioned, distributed, and cached locally rather than
          downloaded on every run.
        tests:
          - SpdxTool_RunNuGetWorkflow
