# DemaConsulting.SpdxTool MSTest OTS Requirements
#
# This file contains requirements for the MSTest OTS component used by SpdxTool.
# It is included by the root requirements.yaml file.
---
sections:
  - title: SpdxTool Requirements
    sections:
      - title: MSTest
        requirements:
          - id: SpdxTool-OTS-MSTest
            title: MSTest shall execute unit tests and report results.
            tags:
              - ots
            justification: |
              MSTest (MSTest.TestFramework and MSTest.TestAdapter) is the unit-testing framework
              used by the project. It discovers and runs all test methods and writes TRX result
              files that feed into coverage reporting and requirements traceability.
            tests:
              - Version_ShortFlag_DisplaysVersion
              - Version_LongFlag_DisplaysVersion
              - Usage_ShortHelpFlag_DisplaysUsage
