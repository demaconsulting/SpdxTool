# DemaConsulting.SpdxTool System Requirements
#
# This file contains system-level requirements for the DemaConsulting.SpdxTool system,
# covering the command-line interface. It is included by the root requirements.yaml file.
---
sections:
  - title: SpdxTool Requirements
    sections:
      - title: Command-Line Interface
        requirements:
          - id: SpdxTool-Command-Version
            title: The tool shall display version information when invoked with the -v or --version flag.
            tags:
              - cli
            justification: |
              Users need to check the version of the tool they are using for compatibility
              and troubleshooting purposes.
            tests:
              - Version_ShortFlag_DisplaysVersion
              - Version_LongFlag_DisplaysVersion

          - id: SpdxTool-Command-Help
            title: The tool shall display usage information when invoked with the -h, -?, or --help flag.
            tags:
              - cli
            justification: |
              Users need quick access to help documentation to understand how to use the
              tool effectively.
            tests:
              - Usage_ShortHelpFlag_DisplaysUsage
              - Usage_LongHelpFlag_DisplaysUsage

          - id: SpdxTool-Command-InvalidArgs
            title: The tool shall display an error and usage information when invoked without arguments.
            tags:
              - cli
            justification: |
              When users invoke the tool without any arguments, they should receive
              guidance on proper usage rather than encountering undefined behavior.
            tests:
              - Usage_NoArguments_DisplaysError

          - id: SpdxTool-Command-Silent
            title: The tool shall silence console output when invoked with the -s or --silent flag.
            tags:
              - cli
            justification: |
              In automated scripts and CI/CD pipelines, users may want to suppress
              console output to reduce log noise.
            tests:
              - Silent_ShortFlag_SuppressesOutput
              - Silent_LongFlag_SuppressesOutput

          - id: SpdxTool-Command-Log
            title: The tool shall write output to a log file when invoked with the -l or --log flag.
            tags:
              - cli
            justification: |
              Users need the ability to capture tool output to files for auditing,
              debugging, and record-keeping purposes.
            tests:
              - Log_ShortFlag_WritesOutputToFile
              - Log_LongFlag_WritesOutputToFile

          - id: SpdxTool-Command-Validate
            title: The tool shall perform self-validation when invoked with the --validate flag.
            tags:
              - cli
            justification: |
              Self-validation ensures that the tool functions correctly after installation
              or deployment. This is critical for CI/CD pipelines and quality assurance.
            children:
              - SpdxTool-SelfTest-Validate
            tests:
              - SelfTest_ValidateFlag_Succeeds

          - id: SpdxTool-Command-Depth
            title: The tool shall support depth control for self-validation output.
            tags:
              - cli
            justification: |
              Users may want to see detailed hierarchical results during self-validation
              to understand which specific tests passed or failed at different depths.
            children:
              - SpdxTool-SelfTest-Depth
            tests:
              - SelfTest_ValidateFlagWithDepth_ShowsDepth

          - id: SpdxTool-Command-ResultsTrx
            title: The tool shall write self-validation results as TRX when the --result flag uses a .trx extension.
            tags:
              - cli
            justification: |
              CI/CD systems and test reporting tools often require test results in
              standardized formats like TRX. This enables integration with existing
              test infrastructure.
            children:
              - SpdxTool-SelfTest-ResultsTrx
            tests:
              - SelfTest_ValidateFlagWithResults_GeneratesTrxFile

          - id: SpdxTool-Command-ResultsJUnit
            title: The tool shall write self-validation results as JUnit XML when the --result flag uses .xml extension.
            tags:
              - cli
            justification: |
              Many CI/CD systems and test reporting tools support JUnit XML format.
              Auto-detecting the format from the file extension allows users to generate
              JUnit output without requiring a separate flag.
            children:
              - SpdxTool-SelfTest-ResultsJUnit
            tests:
              - SelfTest_ValidateFlagWithResults_GeneratesJUnitFile
