# DemaConsulting.SpdxTool hash Command Requirements
#
# This file contains requirements for the hash command.
# It is included by the root requirements.yaml file.
---
sections:
  - title: hash Command
    requirements:
      - id: SpdxTool-Hash-Hash
        title: The tool shall compute and verify file hashes using the hash command.
        tags:
          - spdx
        justification: |
          SPDX documents often include file hashes for integrity verification.
          Users need to compute hashes using various algorithms and verify that
          files match expected hash values.
        tests:
          - Hash_GenerateOperation_UpdatesPackageHash
          - Hash_VerifyOperation_SucceedsForValidHash
          - Hash_VerifyOperation_FailsForInvalidHash
