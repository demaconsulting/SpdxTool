---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following software unit boundaries.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "requirements.yaml"          # Root requirements file
  - "docs/reqstream/**/*.yaml"   # Requirements files
  - "docs/design/**/*.md"        # Design documentation
  - "**/*.cs"                    # All C# source and test files
  - "!**/obj/**"                 # Exclude build output
  - "!**/bin/**"                 # Exclude build output

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/SpdxTool/reviews/index.json

# Review sets grouping files by logical unit of review.
# Each review-set groups source and tests for a coherent software unit
# so that an AI-assisted review can verify consistency across the full evidence chain.
reviews:
  # System-level review for DemaConsulting.SpdxTool
  - id: SpdxTool-System
    title: Review of DemaConsulting.SpdxTool System
    paths:
      - "docs/reqstream/spdxtool-system.yaml"
      - "docs/design/introduction.md"
      - "docs/design/spdxtool-system.md"
      - "src/**/Program.cs"
      - "src/**/Context.cs"
      - "src/**/Runner.cs"
      - "src/**/AssemblyInfo.cs"
      - "test/**/System/IntegrationTests.cs"
      - "test/**/System/ProgramTests.cs"
      - "test/**/Runner.cs"
      - "test/**/AssemblyInfo.cs"

  # System-level review for DemaConsulting.SpdxTool.Targets
  - id: SpdxTool-Targets
    title: Review of DemaConsulting.SpdxTool.Targets System
    paths:
      - "docs/reqstream/spdxtool-targets-system.yaml"
      - "docs/design/spdxtool-targets-system.md"
      - "src/DemaConsulting.SpdxTool.Targets/**"
      - "test/DemaConsulting.SpdxTool.Targets.Tests/**"

  # Design review
  - id: SpdxTool-Design
    title: Review of SpdxTool Design Documentation
    paths:
      - "docs/reqstream/spdxtool-system.yaml"
      - "docs/reqstream/platform-requirements.yaml"
      - "docs/design/**/*.md"

  # All requirements review
  - id: SpdxTool-AllRequirements
    title: Review of All SpdxTool Requirements
    paths:
      - "requirements.yaml"
      - "docs/reqstream/**/*.yaml"

  # Software unit reviews
  - id: SpdxTool-Context
    title: Review of SpdxTool Context Unit
    paths:
      - "src/**/Context.cs"
      - "test/**/LogTests.cs"

  - id: SpdxTool-Commands
    title: Review of SpdxTool Commands Subsystem
    paths:
      - "docs/reqstream/commands/*.yaml"
      - "docs/design/commands/*.md"
      - "src/**/Commands/**"
      - "test/**/Commands/**"

  - id: SpdxTool-SelfTest
    title: Review of SpdxTool SelfTest Subsystem
    paths:
      - "docs/reqstream/self-test/self-test.yaml"
      - "docs/design/self-test/self-test.md"
      - "src/**/SelfValidation/**"
      - "test/**/SelfTest/SelfTestTests.cs"

  - id: SpdxTool-Utility
    title: Review of SpdxTool Utility Subsystem
    paths:
      - "docs/reqstream/utility.yaml"
      - "docs/design/utility.md"
      - "src/**/Spdx/**"
      - "src/**/Utility/**"
      - "test/**/Utility/**"

  - id: SpdxTool-OTS
    title: Review of SpdxTool OTS Software
    paths:
      - "docs/reqstream/ots/mstest.yaml"
      - "docs/reqstream/ots/reqstream.yaml"
      - "docs/reqstream/ots/buildmark.yaml"
      - "docs/reqstream/ots/versionmark.yaml"
      - "docs/reqstream/ots/sarifmark.yaml"
      - "docs/reqstream/ots/sonarmark.yaml"
