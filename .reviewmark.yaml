---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following software unit boundaries.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "**/*.cs"        # All C# source and test files
  - "!**/obj/**"     # Exclude build output
  - "!**/bin/**"     # Exclude build output

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/SpdxTool/reviews/index.json

# Review sets grouping files by logical unit of review.
# Each review-set groups source and tests for a coherent software unit
# so that an AI-assisted review can verify consistency across the full evidence chain.
reviews:
  # Software unit reviews
  - id: SpdxTool-Context
    title: Review of SpdxTool Context Unit
    paths:
      - "src/**/Context.cs"
      - "test/**/LogTests.cs"

  - id: SpdxTool-Program
    title: Review of SpdxTool Program Unit
    paths:
      - "src/**/Program.cs"
      - "src/**/SelfValidation/**"
      - "test/**/SelfValidationTests.cs"
      - "test/**/Runner.cs"
      - "test/**/AssemblyInfo.cs"

  - id: SpdxTool-Commands
    title: Review of SpdxTool Commands Unit
    paths:
      - "src/**/Commands/**"
      - "test/**/AddPackageTests.cs"
      - "test/**/AddRelationshipTests.cs"
      - "test/**/CommandTests.cs"
      - "test/**/CopyPackageTests.cs"
      - "test/**/DiagramTests.cs"
      - "test/**/FindPackageTests.cs"
      - "test/**/GetVersionTests.cs"
      - "test/**/HashTests.cs"
      - "test/**/HelpTests.cs"
      - "test/**/PrintTests.cs"
      - "test/**/QueryTests.cs"
      - "test/**/RenameIdTests.cs"
      - "test/**/RunWorkflowTests.cs"
      - "test/**/SetVariableTests.cs"
      - "test/**/SilentTests.cs"
      - "test/**/ToMarkdownTests.cs"
      - "test/**/UnknownCommandTests.cs"
      - "test/**/UpdatePackageTests.cs"
      - "test/**/UsageTests.cs"
      - "test/**/ValidateTests.cs"
      - "test/**/VersionTests.cs"
      - "test/**/WildcardTests.cs"

  - id: SpdxTool-Utility
    title: Review of SpdxTool Utility Unit
    paths:
      - "src/**/Spdx/**"
      - "test/**/PathHelpersTests.cs"

  - id: SpdxTool-Targets
    title: Review of SpdxTool MSBuild Targets Unit
    paths:
      - "test/DemaConsulting.SpdxTool.Targets.Tests/**"
